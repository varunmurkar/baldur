name: CI

on:
  pull_request:
  push:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Verify package builds
        run: gem build baldur.gemspec

      - name: Run standalone tests
        run: bundle exec ruby test/run_all.rb
